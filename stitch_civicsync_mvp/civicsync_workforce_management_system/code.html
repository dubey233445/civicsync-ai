<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

              "on-secondary": "#000478",

              "on-primary-container": "#001e5a",
              "on-secondary-fixed": "#1c248e",
              "secondary": "#8b94ff",
              "on-surface-variant": "#a3aac4",
              "surface-container-low": "#091328",
              "tertiary-dim": "#ef8fe5",
              "background": "#060d20",
              "surface-container-high": "#141f38",
              "surface-variant": "#1a2540",
              "primary-fixed": "#7b9cff",
              "on-tertiary-fixed-variant": "#711f6f",
              "secondary-container": "#313aa1",
              "secondary-fixed-dim": "#bbbfff",
              "on-secondary-container": "#caccff",
              "outline": "#6d758c",
              "on-primary-fixed": "#000000",
              "tertiary-container": "#fe9cf4",
              "surface-dim": "#060d20",
              "on-error-container": "#ffa8a3",
              "inverse-primary": "#0053dc",
              "secondary-fixed": "#cbceff",
              "surface-container": "#0f1930",
              "primary": "#90abff",
              "on-tertiary": "#722070",
              "on-tertiary-fixed": "#480049",
              "error-container": "#9f0519",
              "outline-variant": "#40475d",
              "primary-container": "#7b9cff",
              "on-primary-fixed-variant": "#00266e",
              "error": "#ff716c",
              "tertiary-fixed-dim": "#ef8fe5",

              "primary-dim": "#316bf3",
              "on-tertiary-container": "#661466"

            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]

            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }

<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #316bf3 0%, #90abff 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Suppression: Handled by "Destination Rule" (Transactional Page) -->
<!-- Instead, a simple branding header for the Sentinel aesthetic -->
<header class="fixed top-0 w-full z-50 bg-[#060d20]/80 backdrop-blur-xl flex items-center justify-center px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="security">security</span>
<span class="text-xl font-extrabold tracking-tighter text-[#dee5ff] font-headline">CivicSync</span>
</div>
</header>
<main class="flex-grow flex flex-col pt-16 pb-12 px-6">
<!-- Branding Area / Hero Illustration Section -->
<section class="mt-8 mb-10 flex flex-col items-center text-center">
<div class="relative w-full aspect-square max-w-[280px] mb-8 group">
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full"></div>
<div class="relative w-full h-full rounded-full border border-outline-variant/20 overflow-hidden bg-surface-container flex items-center justify-center">
<img alt="Digital security representation" class="w-full h-full object-cover opacity-60 mix-blend-luminosity" data-alt="Abstract cinematic visualization of a secure digital network with blue glowing nodes and lines on a deep black background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-7RvGNvcG2NUxs82iQhz81LP70Gjr1qXsP7pvcUma05r_or50bn4-Xa8tBhIVXa3VatHFNF4xZ6yMlmifBcr5SQrRuiev81Ahew4xDPqAk1Vx8f3xvUnWphp7AvirLPKOX7Px0BIJMXDUw0WrSCy8VlHAl4cpMTlgm_FKi6ixSAM-zy-E4p-hUX9QvDQWvcgiwVpIS6STG8XUpNN1fJn3ctuoFeDfEuKwzEIHGXDDQhlrWkZxva3exNaeEjPHkCkAtQpevr73lSc"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent"></div>
<span class="absolute material-symbols-outlined text-primary text-6xl opacity-80" data-icon="shield_lock" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
</div>
<h1 class="text-display-md font-extrabold tracking-tight text-on-surface mb-2 leading-tight">
                Welcome <span class="text-primary">Sentinel</span>
</h1>
<p class="text-on-surface-variant text-body-md max-w-[280px]">
                Access the command center for your global workforce logistics.
            </p>
</section>
<!-- Authentication Form -->
<section class="w-full max-w-md mx-auto">
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-label-md font-semibold text-on-surface-variant tracking-wider uppercase ml-1" for="email">
                        Email
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary/40 transition-all outline-none" id="email" name="email" placeholder="name@civicsync.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="text-label-md font-semibold text-on-surface-variant tracking-wider uppercase" for="password">
                            Password
                        </label>
<a class="text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary/40 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full primary-gradient text-on-primary font-bold py-4 rounded-xl shadow-[0_8px_16px_-4px_rgba(49,107,243,0.3)] hover:shadow-[0_12px_24px_-4px_rgba(49,107,243,0.4)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-8" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-body-md">
                    New to the network? 
                    <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Create an Account</a>
</p>
</div>
</section>
<!-- Social/SSO Divider -->
<section class="mt-12 w-full max-w-md mx-auto">
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
<span class="text-label-md text-outline uppercase tracking-widest">Enterprise Access</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container py-3 rounded-xl border border-outline-variant/10 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="hub">hub</span>
<span class="text-label-md font-bold text-on-surface">SSO</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container py-3 rounded-xl border border-outline-variant/10 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="fingerprint">fingerprint</span>
<span class="text-label-md font-bold text-on-surface">Biometric</span>
</button>
</div>
</section>
</main>
<!-- Support Footer -->
<footer class="mt-auto py-8 flex flex-col items-center justify-center gap-4 text-on-surface-variant">
<div class="flex items-center gap-6">
<a class="text-label-md flex items-center gap-1 hover:text-on-surface transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="contact_support">contact_support</span>
                Support
            </a>
<div class="w-1 h-1 rounded-full bg-outline-variant/40"></div>
<a class="text-label-md flex items-center gap-1 hover:text-on-surface transition-colors" href="#">
<span class="material-symbols-outlined text-[16px]" data-icon="language">language</span>
                English
            </a>
</div>
<div class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-surface-container-low border border-outline-variant/10">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#90abff]"></span>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Network Status: Operational</span>
</div>
</footer>
</body></html>
